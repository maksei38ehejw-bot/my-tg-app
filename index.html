<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Clicker App</title>
    <!-- Подключаем официальный скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131418;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
        }
        .header { margin-top: 30px; }
        .score { font-size: 48px; font-weight: bold; color: #f39c12; margin: 10px 0; }
        .stats { color: #aaa; font-size: 14px; }
        
        /* Кнопка-монетка */
        .coin-container { display: flex; justify-content: center; align-items: center; flex-grow: 1; }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #f1c40f, #f39c12);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.4), inset 0 -8px 0 #d35400;
            cursor: pointer;
            transition: transform 0.05s ease;
        }
        .coin:active { transform: scale(0.95); }

        /* Нижняя панель управления */
        .footer { padding-bottom: 30px; }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 #27ae60;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-save { background-color: #3498db; box-shadow: 0 4px 0 #2980b9; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats" id="username">Загрузка игрока...</div>
        <div class="score" id="balance">0</div>
        <div class="stats" id="per-click">Клик: +1</div>
    </div>

    <div class="coin-container">
        <div class="coin" onclick="makeClick()"></div>
    </div>

    <div class="footer">
        <button class="btn" id="upgrade-btn" onclick="buyUpgrade()">🚀 Прокачать клик (Цена: 10)</button>
        <button class="btn btn-save" onclick="sendResultToBot()">💾 Сохранить и выйти</button>
    </div>

    <script>
        // Инициализируем Telegram Web App API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем окно на весь экран приложения

        let balance = 0;
        let clickPower = 1;
        let upgradePrice = 10;

        // Берем имя пользователя прямо из Телеграма!
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = `Игрок: ${tg.initDataUnsafe.user.first_name}`;
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('per-click').innerText = `Клик: +${clickPower}`;
            document.getElementById('upgrade-btn').innerText = `🚀 Прокачать клик (Цена: ${upgradePrice})`;
        }

        function makeClick() {
            balance += clickPower;
            updateUI();
        }

        function buyUpgrade() {
            if (balance >= upgradePrice) {
                balance -= upgradePrice;
                clickPower += 1;
                upgradePrice = Math.round(upgradePrice * 1.6); // Цена прокачки растет
                updateUI();
            } else {
                alert("Не хватает монет!");
            }
        }

        // ОТПРАВКА ДАННЫХ В БОТА
        function sendResultToBot() {
            const data = {
                final_balance: balance,
                click_power: clickPower
            };
            // Передаем строку JSON обратно в Python-код бота
            tg.sendData(JSON.stringify(data));
            tg.close(); // Закрываем мини-приложение
        }
    </script>
</body>
</html>
