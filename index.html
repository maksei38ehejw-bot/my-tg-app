<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFO Catcher</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0b0c10;
            overflow: hidden; font-family: sans-serif; user-select: none;
            touch-action: none; display: flex; flex-direction: column; height: 100vh;
        }
        #gameCanvas { background: radial-gradient(circle, #1f2833, #0b0c10); display: block; }
        .ui-panel {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 20px; pointer-events: none;
        }
        .btn {
            background: linear-gradient(45deg, #45f3ff, #d400d4);
            color: white; border: none; padding: 15px 35px;
            font-size: 18px; font-weight: bold; border-radius: 25px;
            cursor: pointer; pointer-events: auto; box-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-panel">
        <button class="btn" id="action-btn" onclick="handleBtnClick()">Старт</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const btn = document.getElementById("action-btn");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 80;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        
        const player = { x: canvas.width / 2 - 40, y: canvas.height - 40, w: 80, h: 15 };
        let items = [];

        window.addEventListener("pointermove", (e) => {
            if (!gameStarted || gameOver) return;
            player.x = e.clientX - player.w / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
        });

        function spawnItem() {
            if (!gameStarted || gameOver) return;
            const isMeteor = Math.random() < 0.35;
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                radius: isMeteor ? 12 : 8,
                speed: 3 + Math.random() * 4 + (score * 0.1),
                type: isMeteor ? "meteor" : "star"
            });
            setTimeout(spawnItem, Math.max(300, 800 - score * 10));
        }

        function update() {
            if (!gameStarted || gameOver) return;

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;

                if (item.y + item.radius >= player.y && item.x >= player.x && item.x <= player.x + player.w) {
                    if (item.type === "star") {
                        score += 1;
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
                    } else {
                        gameOver = true;
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
                        
                        // Показываем кнопку сохранения обратно после проигрыша!
                        btn.style.display = "block";
                        btn.innerText = "💾 Сохранить результат";
                    }
                    items.splice(i, 1);
                    continue;
                }

                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#45f3ff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#45f3ff";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                if (item.type === "star") {
                    ctx.fillStyle = "#ff00ff";
                    ctx.shadowColor = "#ff00ff";
                } else {
                    ctx.fillStyle = "#ff3333";
                    ctx.shadowColor = "#ff3333";
                }
                ctx.fill();
            });

            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 24px sans-serif";
            ctx.fillText(`Очки: ${score}`, 20, 40);

            if (gameOver) {
                ctx.fillStyle = "#ff3333";
                ctx.font = "bold 36px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2);
                ctx.textAlign = "left";
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleBtnClick() {
            if (!gameStarted) {
                gameStarted = true;
                btn.style.display = "none"; // Прячем кнопку "Старт" во время игры
                spawnItem();
            } else if (gameOver) {
                tg.sendData(JSON.stringify({ caught_stars: score }));
                tg.close();
            }
        }

        gameLoop();
    </script>
</body>
</html>
