<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Neon Bird</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d1117;
            overflow: hidden; font-family: sans-serif; user-select: none;
            touch-action: none; display: flex; flex-direction: column; height: 100vh;
        }
        #gameCanvas { background: linear-gradient(to bottom, #0d1b2a, #1b263b); display: block; }
        .ui-panel {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; pointer-events: none;
        }
        .btn {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: bold; border-radius: 25px;
            cursor: pointer; pointer-events: auto; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-panel">
        <button class="btn" id="action-btn" onclick="handleBtnClick()">Старт</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const btn = document.getElementById("action-btn");

        // Адаптируем под размеры экрана Telegram
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 80;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;

        // Настройки птички
        const bird = {
            x: 50,
            y: canvas.height / 2,
            radius: 12,
            gravity: 0.4,
            velocity: 0,
            jump: -6.5
        };

        // Настройки труб
        let pipes = [];
        const pipeWidth = 50;
        const pipeGap = 130; // Просвет между верхней и нижней трубой (чем меньше, тем сложнее)
        const pipeSpeed = 2.5;

        // Прыжок при тапе по экрану
        window.addEventListener("pointerdown", (e) => {
            // Игнорируем тапы по кнопке «Старт» / «Сохранить»
            if (e.target.tagName === "BUTTON") return;
            if (!gameStarted || gameOver) return;
            
            bird.velocity = bird.jump;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        });

        function spawnPipe() {
            if (!gameStarted || gameOver) return;
            
            // Генерируем случайную высоту для верхней трубы
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - 50;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;

            pipes.push({
                x: canvas.width,
                top: topHeight,
                bottom: canvas.height - topHeight - pipeGap,
                passed: false
            });

            // Спавним новую трубу каждые 120 кадров (примерно раз в 2 секунды)
            setTimeout(spawnPipe, 1800);
        }

        function update() {
            if (!gameStarted || gameOver) return;

            // Физика птички
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Проверка на удар об пол или потолок
            if (bird.y + bird.radius >= canvas.height || bird.y - bird.radius <= 0) {
                endGame();
            }

            // Движение труб
            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= pipeSpeed;

                // Проверка столкновения с верхней трубой
                if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + pipeWidth) {
                    if (bird.y - bird.radius < p.top || bird.y + bird.radius > canvas.height - p.bottom) {
                        endGame();
                    }
                }

                // Засчитываем очко, если пролетели трубу
                if (!p.passed && p.x + pipeWidth < bird.x) {
                    score++;
                    p.passed = true;
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
                }

                // Удаляем трубы, улетевшие за экран
                if (p.x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем трубы (неоновые зеленые прямоугольники)
            pipes.forEach(p => {
                ctx.fillStyle = "#39ff14";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#39ff14";
                
                // Верхняя труба
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                // Нижняя труба
                ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
            });

            // Рисуем птичку (светящийся розовый круг)
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ff007f";
            ctx.shadowColor = "#ff007f";
            ctx.shadowBlur = 15;
            ctx.fill();

            // Рисуем счетчик
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 26px sans-serif";
            ctx.fillText(`Счет: ${score}`, 20, 40);

            if (gameOver) {
                ctx.fillStyle = "#ff0055";
                ctx.font = "bold 36px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2);
                ctx.textAlign = "left";
            }
        }

        function endGame() {
            gameOver = true;
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
            btn.style.display = "block";
            btn.innerText = "💾 Сохранить результат";
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleBtnClick() {
            if (!gameStarted) {
                gameStarted = true;
                btn.style.display = "none";
                spawnPipe();
            } else if (gameOver) {
                // Передаем счет обратно в Python-бота под тем же ключом
                tg.sendData(JSON.stringify({ caught_stars: score }));
                tg.close();
            }
        }

        gameLoop();
    </script>
</body>
</html>
